<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Veloxineology</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ====== NAVIGATION BAR ====== -->
    <nav class="tabs">
        <a href="index.html">🏠 Overview</a>
        <a href="projects.html" class="active">💡 Repositories</a>
        <a href="blog.html">📝 Blog</a>
        <a href="books.html">📚 Books</a>
        <a href="contact.html">📞 Contact</a>
    </nav>

    <!-- ====== PROJECTS CONTENT ====== -->
    <main class="content">
        <h1>💡 My Projects</h1>
        <p>Here are some of my featured repositories:</p>

        <div id="repo-list">
            <!-- GitHub Repositories will be loaded here dynamically -->
        </div>
    </main>

</body>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const username = "veloxineology"; // Your GitHub username
        const apiUrl = `https://api.github.com/users/${username}/repos`;

        async function fetchRepositories() {
            try {
                const response = await fetch(apiUrl);
                const repos = await response.json();
                const repoList = document.getElementById("repo-list");

                repoList.innerHTML = ""; // Clear previous entries

                repos.forEach(repo => {
                    const repoCard = document.createElement("div");
                    repoCard.classList.add("repo-card");
                    repoCard.innerHTML = `
                        <h2>${repo.name}</h2>
                        <p>${repo.description || "No description available."}</p>
                        <a href="${repo.html_url}" target="_blank">🔗 View on GitHub</a>
                    `;
                    repoList.appendChild(repoCard);
                });
            } catch (error) {
                console.error("Error fetching repositories:", error);
            }
        }

        fetchRepositories();
    });
</script>
</html>
